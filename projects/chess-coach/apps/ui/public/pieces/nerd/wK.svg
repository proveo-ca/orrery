<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
    <g stroke="#222" stroke-linecap="round" stroke-linejoin="round"
       stroke-width="1.5">
        <!-- Base skirt ring -->
        <ellipse fill="#555" cx="22.5" cy="39" rx="20" ry="5"/>
        <!-- Dome front face (curved band, darker) -->
        <path fill="#888" d="M2 36 Q2 24 22.5 20 Q43 24 43 36 Q43 39 22.5 41 Q2 39 2 36z"/>
        <!-- Dome top surface (lighter, higher) -->
        <ellipse fill="#aaa" cx="22.5" cy="21" rx="17" ry="6"/>
        <!-- Blue armor panels on front face (two rows) -->
        <!-- Bottom row (large, on curved face) -->
        <rect fill="#444" x="16" y="35" width="12" height="8" rx="1.5"/>
        <!-- Building lights -->
        <rect fill="#da2" x="18" y="36" width="2" height="2" rx="0.3"/>
        <rect fill="#da2" x="22" y="36" width="2" height="2" rx="0.3"/>
        <rect fill="#da2" x="26" y="36" width="2" height="2" rx="0.3"/>
        <rect fill="#da2" x="18" y="40" width="2" height="2" rx="0.3"/>
        <rect fill="#da2" x="22" y="40" width="2" height="2" rx="0.3"/>
        <rect fill="#da2" x="26" y="40" width="2" height="2" rx="0.3"/>
        <!-- Top row (smaller, on dome shoulder) -->
        <rect fill="#3b7dd8" x="7" y="21" width="5" height="6" rx="1"/>
        <rect fill="#3b7dd8" x="33" y="21" width="5" height="6" rx="1"/>
        <!-- Blue disc platform on dome top -->
        <ellipse fill="#3b7dd8" cx="22.5" cy="16" rx="9" ry="4.5"/>
        <ellipse fill="#4a8ae0" cx="22.5" cy="15" rx="8" ry="3.5"/>
    </g>
</svg>
