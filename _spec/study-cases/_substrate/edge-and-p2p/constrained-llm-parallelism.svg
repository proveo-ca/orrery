818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7778" x="158.26" y="164.593">small-model inference</text></g><!--link CMD to GPU--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="13" id="lnk7"><path d="M334.11,113.0547 C327.11,129.4547 316.97,150.7647 305.26,168.0247 C298.36,178.2047 294.0034,183.9256 285.6634,193.2356" fill="none" id="CMD-to-GPU" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="281.66,197.7047,290.6445,193.6701,284.9962,193.9805,284.6858,188.3321,281.66,197.7047" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.709" x="316.51" y="164.593">strategic calls</text></g><!--link GPU to KV--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="14" id="lnk8"><path d="M195.9,277.8047 C167.48,301.7447 136.2092,328.0896 109.9092,350.2396" fill="none" id="GPU-to-KV" style="stroke:#585858;stroke-width:1;stroke-dasharray:1,3;"/><polygon fill="#585858" points="105.32,354.1047,114.7806,351.3666,109.1444,350.8838,109.6271,345.2476,105.32,354.1047" style="stroke:#585858;stroke-width:1;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.2705" x="156.76" y="321.053">page blocks (avoid thrash)</text></g><!--link GPU to GMN9--><g class="link" data-entity-1="ent0004" data-entity-2="ent0010" data-link-type="association" data-source-line="17" id="lnk11"><path d="M295.28,277.9047 C307.6,287.3647 320.53,297.6047 332.26,307.4847 C351.05,323.3147 371.28,342.0447 387.06,357.0647" fill="none" id="GPU-GMN9" style="stroke:#585858;stroke-width:1;stroke-dasharray:7,7;"/></g><?plantuml-src RLBDRjD04BxxAOPSI4HYXrH245MLGgYgA74IDRHmGAhMth6zT7-itNNIt7W8teKxZyAJC6j741LyyynyF_FDlX0wbmr7gBoltJH9B3l4fV1LapKERMwqH-tZtAYajcQFPfIpH72g2NzC51FwL8_hHic8gX9XRhJpbdh8ORLAOSiianAbS2fwINyr