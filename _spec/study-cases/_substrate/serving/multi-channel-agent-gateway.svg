hable from any channel: a single gateway fans in</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="453.0957" x="1073.1729" y="533.6272">many chat platforms with cross-channel conversation continuity, over a</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="424.4233" x="1087.5091" y="548.9377">serverless runtime that scales to zero when idle. A serving / access</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.272" x="1154.5848" y="564.2483">substrate, orthogonal to the capability ladder.</text></g><!--link CHAN to GW--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="19" id="lnk8"><path d="M561.77,143.4483 C547.33,156.8683 538.7,172.9083 547.22,190.1883 C552.85,201.5983 557.059,207.6067 566.809,216.0267" fill="none" id="CHAN-to-GW" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="571.35,219.9483,567.1528,211.0385,567.5658,216.6803,561.924,217.0932,571.35,219.9483" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2124" x="548.22" y="186.7566">inbound messages</text></g><!--link GW to CHAN--><g class="link" data-entity-1="ent0003" data-entity-2="ent0002" data-link-type="dependency" data-source-line="21" id="lnk10"><path d="M657.08,219.9683 C662.88,210.7983 668.18,200.5383 671.22,190.1883 C675.87,174.3583 673.6042,163.0349 665.4842,148.7449" fill="none" id="GW-to-CHAN" style="stroke:#585858;stroke-width:1;stroke-dasharray:1,3;"/><polygon fill="#585858" points="662.52,143.5283,663.4886,153.3294,664.9902,147.8755,670.4441,149.3771,662.52,143.5283" style="stroke:#585858;stroke-width:1;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="42.1294" x="673.97" y="186.7566">replies</text></g><!--link GW