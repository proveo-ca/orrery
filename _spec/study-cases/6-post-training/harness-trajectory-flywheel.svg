"23.5308" x="245.37" y="517.513">The</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="125.1694" x="273.014" y="517.513">L4 &#8594; L5/L6 bridge</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.9634" x="398.1835" y="517.513">: the frozen-weight harness is the</text><text fill="#181818" font-family="sans-serif" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="73.417" x="617.2601" y="517.513">data source</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="424.7344" x="255.6564" y="532.8236">for post-training. Each model generation is trained on the previous</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="397.522" x="269.2626" y="548.1341">generation's tool-use trajectories &#8212; this is where weights start</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.8008" x="261.6232" y="563.4447">changing (unlike the L4 self-improving loops, which stay frozen).</text></g><!--link HARNESS to TRAJ--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="18" id="lnk7"><path d="M642.31,121.4647 C632.7,130.3947 623.12,140.4947 615.52,151.0147 C605.36,165.0647 599.3278,176.7098 593.0978,191.9698" fill="none" id="HARNESS-to-TRAJ" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="590.83,197.5247,597.935,190.7042,592.7199,192.8956,590.5285,187.6804,590.83,197.5247" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.832" x="616.52" y="164.583">record trajectories</text></g><!--link TRAJ to CURATE--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="19" id="lnk8">