003"><path d="M484.09,208.0147 C484.09,198.0147 577.5226,198.0147 577.5226,198.0147 C577.5226,198.0147 670.9552,198.0147 670.9552,208.0147 L670.9552,266.4795 C670.9552,276.4795 577.5226,276.4795 577.5226,276.4795 C577.5226,276.4795 484.09,276.4795 484.09,266.4795 L484.09,208.0147" fill="#E5E4E4" filter="url(#f1pkav52mq8qy7)" style="stroke:#585858;stroke-width:0.5;"/><path d="M484.09,208.0147 C484.09,218.0147 577.5226,218.0147 577.5226,218.0147 C577.5226,218.0147 670.9552,218.0147 670.9552,208.0147" fill="none" style="stroke:#585858;stroke-width:0.5;"/><text fill="#181818" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="32.293" x="561.3761" y="235.5498">&#171;db&#187;</text><text fill="#181818" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.3516" x="523.8468" y="252.0381">Trajectory store</text><text fill="#181818" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.8652" x="494.09" y="268.5264">(recorded tool-use runs)</text></g><!--entity CURATE--><g class="entity" data-qualified-name="CURATE" data-source-line="14" id="ent0004"><rect fill="#005F7F" filter="url(#f1pkav52mq8qy7)" height="69.4648" rx="6" ry="6" style="stroke:#00BAC6;stroke-width:0.5;" width="209.9365" x="367.55" y="353.4847"/><text fill="#FAFAFA" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="40.0244" x="452.5061" y="377.0198">&#171;app&#187;</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.9365" x="377.55" y="393.5081">Batch-generate + compress</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.334" x="393.3513" y="409.9964">(curate &#183; dedup &#183; distill)</text></g><!--entity TRAIN--><g class="entity" data-qualified-name="TRAIN" data-source-line="15" id="ent0005"><rect fill="#005F7F" filter="url(#f1pkav52mq8qy7)" height="69.4648" rx=