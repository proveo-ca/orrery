)" height="52.9766" rx="6" ry="6" style="stroke:#00BAC6;stroke-width:0.5;" width="194.2275" x="7" y="199.5047"/><text fill="#FAFAFA" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="40.0244" x="84.1016" y="223.0398">&#171;app&#187;</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2275" x="17" y="239.5281">Self-generated responses</text></g><!--entity J--><g class="entity" data-qualified-name="J" data-source-line="10" id="ent0004"><rect fill="#CBDB2A" filter="url(#fm6pi0buhcrfx)" height="69.4648" rx="6" ry="6" style="stroke:#818D00;stroke-width:0.5;" width="157.9561" x="192.14" y="330.9547"/><text fill="#181818" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="52.7119" x="244.7621" y="354.4898">&#171;async&#187;</text><text fill="#181818" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.751" x="205.7425" y="370.9781">Self-judged reward</text><text fill="#181818" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.9561" x="202.14" y="387.4664">(rubric / preference)</text></g><!--entity OPT--><g class="entity" data-qualified-name="OPT" data-source-line="11" id="ent0005"><rect fill="#005F7F" filter="url(#fm6pi0buhcrfx)" height="69.4648" rx="6" ry="6" style="stroke:#00BAC6;stroke-width:0.5;" width="181.9707" x="513.13" y="477.4247"/><text fill="#FAFAFA" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="40.0244" x="584.1031" y="500.9598">&#171;app&#187;</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.9707" x="523.13" y="517.4481">Preference optimization</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70.7246" x="568.753" y="533.9364">(DPO / RL)</text></g><g class="entity" data-qualified-name="GMN11" data-source-line