432.043">results</text></g><!--link EXEC to CTX--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="18" id="lnk11"><path d="M504.53,381.4347 C538.06,399.7647 584.82,424.2947 627.31,442.9747 C662.84,458.5947 673.74,457.4747 709.31,472.9747 C717.62,476.5847 720.8719,478.005 729.3019,482.135" fill="none" id="EXEC-to-CTX" style="stroke:#818D00;stroke-width:2;"/><polygon fill="#818D00" points="734.69,484.7747,728.3676,477.223,730.1999,482.5749,724.848,484.4072,734.69,484.7747" style="stroke:#818D00;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="98.249" x="628.31" y="432.043">final result only</text></g><!--link CTX to AGENT--><g class="link" data-entity-1="ent0006" data-entity-2="ent0002" data-link-type="dependency" data-source-line="19" id="lnk12"><path d="M794.2,484.8547 C797.02,417.2547 796.24,251.2347 731.31,134.5347 C725.02,123.2247 720.0482,117.0364 710.2582,108.6564" fill="none" id="CTX-to-AGENT" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="705.7,104.7547,709.9361,113.646,709.4985,108.0061,715.1384,107.5684,705.7,104.7547" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.6226" x="784.3" y="294.563">observe (one turn)</text></g><?plantuml-src TLJDRjim3BxxARWSjYI8uophoIiAP9anT4YJB4sn7WeCiiN4Gct9aEJyzBI7sBlilaVPauooqZP5CnziIo8_ylj8wesGML5pXDpQoiHHfDcslnOshzFQeCwKj2XjFrDbL6crGHLcB1ASzeJTHoKJyh3Vh-go26YtG1WhZc59B_ZxynVW3hFQihJ0C7DxBBD2IJ0Lon3QpdQKsKxm3kQiGXr3ycJV0C6eiJUG528J5ZwXjQXXChc2qPhoCCyOFRWSNqrWE1YU4TpDOX83F15ZUYSsVQNN4KjDD3mR3Fk3zuCFWzUMddx3UQfgiq23J6TvbACkqOJCHINpDfQfug9qAyVJAbKOs0W6Y_aOLbgLmC1aMbGDkmbki8ZXB0W8k5BIkRKQ1j0cCfqMd7wOWT6NPBg4ytDMLHSNn-xZPptlP9isORwtkHFNXsrv__7iSmAd_2-fkhhIw0IDm339KxLhlOgVt2RZa_vBHvaYPwmea3zoxu6GOQ5KvJaHm78scrm_0N16rMK6mH6W37OMja9ojMtzJu3nyXPS0Zmbzy3BCLeiPjz_N8qkft0W60EMr23F_NQG9l37nmwUKGowb