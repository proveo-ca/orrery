#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="60.1694" x="770.874" y="377.053">semantic</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.8359" x="835.1567" y="377.053">agent-computer interface: the agent operates on the</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="21.4868" x="765.1231" y="392.3636">live</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="119.4883" x="790.7232" y="392.3636">LSP symbol graph</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.3364" x="914.3247" y="392.3636">(definitions, references, type hierarchy)</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74.3691" x="757.0457" y="407.6741">and edits at</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="127.0229" x="835.5281" y="407.6741">symbol granularity</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.1875" x="962.551" y="407.6741">, not text ranges &#8212; distinct from</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="414.2163" x="756.2839" y="422.9847">the tracked tree-sitter static repo-map (Aider). One portable MCP</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.0845" x="771.22" y="438.2952">server is reused across many harnesses; the</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="63.3623" x="1053.4177" y="438.2952">tool layer</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="34.6709" x="1120.8933" y="438.2952">is the</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.9014" x="752.1326" y="453.6058">portable unit &#8212; the inverse of the vendor-neutral</text><text fill="#181818" font-family="sans-serif" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="49.1309" x="1069.1472" y="453.6058">harness</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.2603" x="1122.3914" y="453.6058">adapter.</text></g><!--link HOST to SERENA--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="14" id="lnk7"><path d="M465.8926,121.1547 C465.8926,144.1747 465.8926,168.5147 465.8926,191.5947" fill="none" id="HOST-to-SERENA" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="465.8926,197.5947,469.8926,188.5947,465.8926,192.5947,461.8926,188.5947,465.8926,197.5947" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.4761" x="466.8926" y="164.593">symbol-level tool calls (MCP)</text></g><!--link SERENA to LSP--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="15" id="lnk8"><path d="M296.7126,237.5147 C194.4426,243.7647 77.6726,259.3747 44.8926,297.4847 C26.7826,318.5447 36.5133,342.4292 53.9533,365.4892" fill="none" id="SERENA-to-LSP" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="57.5726,370.2747,55.3341,360.6836,54.5566,366.2868,48.9534,365.5092,57.5726,370.2747" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.3931" x="73.1208" y="311.053">LSP queries &#8212; find symbol,</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.8496" x="45.8926" y="326.3636">refer