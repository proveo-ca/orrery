)" height="69.4648" rx="6" ry="6" style="stroke:#00BAC6;stroke-width:0.5;" width="161.2236" x="300.86" y="336.8893"/><text fill="#FAFAFA" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="40.0244" x="361.4596" y="360.4245">&#171;app&#187;</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.6768" x="311.1334" y="376.9127">Deterministic engine</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="141.2236" x="310.86" y="393.401">(runs the simulation)</text></g><!--entity RES--><g class="entity" data-qualified-name="RES" data-source-line="11" id="ent0005"><rect fill="#005F7F" filter="url(#f1wgiwvpmyk2o9)" height="69.4648" rx="6" ry="6" style="stroke:#00BAC6;stroke-width:0.5;" width="116.8174" x="496.06" y="483.3593"/><text fill="#FAFAFA" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="40.0244" x="534.4565" y="506.8945">&#171;app&#187;</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="71.2852" x="518.8261" y="523.3827">Risk result</text><text fill="#FAFAFA" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.8174" x="506.06" y="539.871">(confidence %)</text></g><g class="entity" data-qualified-name="GMN10" data-source-line="19" id="ent0011"><path d="M6,490.1193 L6,546.0509 A0,0 0 0 0 6,546.0509 L460.9385,546.0509 A0,0 0 0 0 460.9385,546.0509 L460.9385,500.1193 L450.9385,490.1193 L265.51,490.1193 L346.77,406.4893 L257.51,490.1193 L6,490.1193 A0,0 0 0 0 6,490.1193" fill="#E5E4E4" filter="url(#f1wgiwvpmyk2o9)" style="stroke:#B4B3B3;stroke-width:0.5;"/><path d="M450.9385,490.1193 L450.9385,500.1193 L460.9385,500.1193 L450.9385,490.1193" fill="#E5E4E4" style="stroke:#B4B3B3;stroke-width:0.5;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.7046" x="21.9341" y="507.6877">The LLM</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="92.6187" x="78.752" y="507.6877">doesn't guess</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.5205" x="175.4839" y="507.6877">the risk &#8212; it writes a probabilistic model,</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.9385" x="12" y="522.9982">a deterministic engine computes it, and the result is fed back for the</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.4082" x="180.7651" y="538.3088">LLM to explain.</text></g><!--link LLM to MOD--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="13" id="lnk6"><path d="M404.93,113.6793 C394.29,121.8293 384.68,131.6993 378.47,143.4293 C370.99,157.5593 369.9505,169.1641 372.0105,184.2941" fill="none" id="LLM-to-MOD" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="372.82,190.2393,375.5693,180.7819,372.1455,185.285,367.6424,181.8612,372.82,190.2393" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.8843" x="379.47" y="156.9977">write model (not guess)</text></g><!--link MOD to ENG--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="14" id="lnk7"><path d="M381.47,260.0293 C381.47,283.0493 381.47,307.3893 381.47,330.4593" fill="none" id="MOD-to-ENG" style="stroke:#585858;stroke-width:2;"/><polygon fill="#585858" points="381.47,336.4593,385.47,327.4593,381.47,331.4593,377.47,327.4593,381.47,336.4593" style="stroke:#585858;stroke-width:2;"/><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="49.2896" x="382.47" y="303.4577">execute</text></g><!