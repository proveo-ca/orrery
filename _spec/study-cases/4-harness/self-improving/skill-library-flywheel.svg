eable skills</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.4937" x="420.679" y="679.2936">(procedural memory), not gradients. Sibling to</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.1958" x="320.9129" y="694.6041">ACE, which evolves a single</text><text fill="#181818" font-family="sans-serif" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="57.6621" x="498.2219" y="694.6041">playbook</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.7744" x="559.9973" y="694.6041">&#8212; here the artifact is a</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="53.6187" x="326.3496" y="709.9147">reusable</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="76.6543" x="384.0816" y="709.9147">skill library</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="45.9951" x="464.8491" y="709.9147">plus an</text><text fill="#181818" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="112.3408" x="514.9575" y="709.9147">interop standard</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="71.0366" x="627.2984" y="709.9147">, giving the</text><text fill="#181818" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="409.4556" x="307.6145" y="725.2252">otherwise-empty L2 "skills" rung an L4 flywheel that produces it.</text></g><!--link AGENT to RUN--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="14" id="lnk7"><path d="M383.8565,121.1547 C370.9465,144.1747 356.8708,169.2811 343.9308,192.3611" fill="none" id="AGENT-to-RUN" style="stroke:#585858;stroke-width:2;"/><po