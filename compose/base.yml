services:
  llm:
    image: ollama/ollama:latest
    container_name: qwen_llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve & sleep 5 && ollama pull qwen2.5:7b && wait"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:11434/api/tags | grep -q 'qwen2.5:7b' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  ollama_data:
