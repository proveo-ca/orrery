services:
  llm:
    image: ollama/ollama:latest
    container_name: gemma_llm
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - LLM_GENERAL_MODEL=qwen2.5:7b
      - LLM_COMMENTARY_MODEL=hf.co/NAKSTStudio/chess-gemma-commentary:Q8_0
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve & sleep 5 && ollama pull $$LLM_GENERAL_MODEL && ollama pull $$LLM_COMMENTARY_MODEL && touch /tmp/models_ready && wait"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/models_ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s

  app:
    build:
      context: ../projects/chess-coach
      dockerfile: Dockerfile
    container_name: chess_coach
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://gemma_llm:11434/v1
      - LLM_GENERAL_MODEL=qwen2.5:7b
      - LLM_COMMENTARY_MODEL=hf.co/NAKSTStudio/chess-gemma-commentary:Q8_0
      - CHESS_STATE_DIR=/data
      - LLM_DEBUG=true
    volumes:
      - chess_state:/data
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  chess_state:
